name: Build and push Docker image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ${{ vars.IMAGE_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to dhi.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout CVE analysis
        if: github.event_name != 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          sarif-file: scout-results.sarif
          summary: true

      - name: Upload Scout SARIF artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: scout-cves-sarif
          path: scout-results.sarif
          if-no-files-found: error

      - name: Fail on critical CVEs
        if: github.event_name != 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          only-severities: critical
          exit-code: true

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER: eks-cndit
      K8S_NAMESPACE: cndit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"

      - name: Ensure namespace exists
        run: kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        env:
          IMAGE: ${{ env.IMAGE }}@${{ needs.build.outputs.digest }}
        run: |
          envsubst '${IMAGE}' < k8s/deployment.yaml | kubectl apply -n "$K8S_NAMESPACE" -f -
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/service.yaml

      - name: Wait for rollout
        run: kubectl -n "$K8S_NAMESPACE" rollout status deployment/cndit --timeout=180s

      - name: Show service
        run: kubectl -n "$K8S_NAMESPACE" get svc cndit -o wide
